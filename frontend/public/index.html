<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="utf-8"/>
  <link rel="icon" href="/logo.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <!--
    Fallback title/description for the homepage only.
    All other pages get unique <title>, <meta description>, <link rel="canonical">
    og: and twitter: tags injected by the PageSEO component (react-helmet-async).
    Do NOT add canonical, og:title, og:description, twitter:title, twitter:description
    here — they would conflict with Helmet's per-page tags and cause duplicate SEO
    issues in Google Search Console.
  -->
  <title>HikmahSphere – Islamic App for Prayer Times, Quran, Zakat &amp; Muslim Community</title>
  <meta name="description" content="HikmahSphere is your all-in-one Islamic platform. Get accurate daily prayer times worldwide, read the complete Quran with 10+ translations and audio recitations, calculate Zakat with live nisab rates, and connect with a global Muslim community — free, ad-free and private."/>

  <meta name="theme-color" content="#000000"/>
  <meta name="author" content="HikmahSphere"/>

  <!-- Safe og: fallbacks (Helmet overrides title/description/url/canonical per-page) -->
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="HikmahSphere"/>
  <meta property="og:image" content="https://hikmahsphere.site/logo.png"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:image" content="https://hikmahsphere.site/logo.png"/>

  <!-- Schema Markup (site-wide structured data, does not affect per-page SEO) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "HikmahSphere",
    "alternateName": "The Unified Islamic Digital Platform",
    "description": "HikmahSphere is a comprehensive Islamic application featuring highly accurate prayer times for all global locations with multiple calculation methods, complete Quran reader with 10+ translations in English (Sahih International, Pickthall, Yusuf Ali), Urdu, Hindi, French, Spanish, Indonesian, Turkish, and Arabic, transliteration support, Indo-Pak Nastaleeq font, audio recitations from renowned reciters like Mishary Alafasy and Abdul Basit. Advanced Zakat calculator with automatic nisab value updates, live gold and silver prices in multiple currencies (INR, USD, GBP, EUR, SAR, AED), support for all asset types including cryptocurrency. AR-powered Qibla finder, Hijri/Islamic calendar, Ramadan timings, fasting schedules, and beautiful responsive design.",
    "url": "https://hikmahsphere.site",
    "applicationCategory": "ReligiousApplication",
    "operatingSystem": "All",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "featureList": [
      "Accurate Prayer Times Worldwide",
      "Multiple Calculation Methods (Karachi, MWL, ISNA, etc.)",
      "Madhab Support (Hanafi, Shafi, Maliki, Hanbali)",
      "Complete Quran Reader - 114 Surahs",
      "10+ Translations (English, Urdu, Hindi, French, Spanish, Indonesian, Turkish, Arabic)",
      "Transliteration Support",
      "Indo-Pak Nastaleeq Font",
      "Audio Recitations - Famous Reciters",
      "Semantic AI Search",
      "Bookmarks & Last Read",
      "Zakat Calculator with Live Nisab Values",
      "Automatic Gold & Silver Prices",
      "Multi-Currency Support",
      "Cryptocurrency Zakat Calculation",
      "AR-Powered Qibla Finder",
      "Hijri/Islamic Calendar",
      "Ramadan Timings & Fasting Schedule",
      "Weather Integration",
      "Beautiful Responsive Design",
      "Dark/Light Theme"
    ],
    "audience": {
      "@type": "Audience",
      "audienceType": "Muslims worldwide"
    },
    "inLanguage": ["en", "ar", "ur", "hi", "fr", "es", "id", "tr"]
  }
  </script>

  <link rel="manifest" href="/manifest.json"/>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
