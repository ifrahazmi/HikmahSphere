<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="utf-8"/>
  <link rel="icon" href="/logo.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <!--
    Fallback title/description for the homepage only.
    All other pages get unique <title>, <meta description>, <link rel="canonical">
    og: and twitter: tags injected by the PageSEO component (react-helmet-async).
    Do NOT add canonical, og:title, og:description, twitter:title, twitter:description
    here — they would conflict with Helmet's per-page tags and cause duplicate SEO
    issues in Google Search Console.
  -->
  <title>HikmahSphere – Islamic App for Prayer Times, Quran, Zakat &amp; Muslim Community</title>
  <meta name="description" content="HikmahSphere is your all-in-one Islamic platform. Get accurate daily prayer times worldwide, read the complete Quran with 10+ translations and audio recitations, calculate Zakat with live nisab rates, and connect with a global Muslim community — free, ad-free and private."/>

  <meta name="theme-color" content="#000000"/>
  <meta name="author" content="HikmahSphere"/>

  <!-- Safe og: fallbacks (Helmet overrides title/description/url/canonical per-page) -->
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="HikmahSphere"/>
  <meta property="og:image" content="https://hikmahsphere.site/logo.png"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:image" content="https://hikmahsphere.site/logo.png"/>

  <!-- Schema Markup (site-wide structured data, does not affect per-page SEO) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "HikmahSphere",
    "alternateName": "The Unified Islamic Digital Platform",
    "description": "HikmahSphere is a comprehensive Islamic application featuring highly accurate prayer times for all global locations with multiple calculation methods, complete Quran reader with 10+ translations in English (Sahih International, Pickthall, Yusuf Ali), Urdu, Hindi, French, Spanish, Indonesian, Turkish, and Arabic, transliteration support, Indo-Pak Nastaleeq font, audio recitations from renowned reciters like Mishary Alafasy and Abdul Basit. Authentic Dhikr and Dua library with full references, Arabic text, transliteration, English/Urdu translation, and an online tasbih counter. Advanced Zakat calculator with automatic nisab value updates, live gold and silver prices in multiple currencies (INR, USD, GBP, EUR, SAR, AED), support for all asset types including cryptocurrency. Hijri/Islamic calendar, Ramadan timings, fasting schedules, and beautiful responsive design.",
    "url": "https://hikmahsphere.site",
    "applicationCategory": "ReligiousApplication",
    "operatingSystem": "All",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "featureList": [
      "Accurate Prayer Times Worldwide",
      "Multiple Calculation Methods (Karachi, MWL, ISNA, etc.)",
      "Madhab Support (Hanafi, Shafi, Maliki, Hanbali)",
      "Complete Quran Reader - 114 Surahs",
      "10+ Translations (English, Urdu, Hindi, French, Spanish, Indonesian, Turkish, Arabic)",
      "Transliteration Support",
      "Indo-Pak Nastaleeq Font",
      "Audio Recitations - Famous Reciters",
      "Semantic AI Search",
      "Bookmarks & Last Read",
      "Zakat Calculator with Live Nisab Values",
      "Automatic Gold & Silver Prices",
      "Multi-Currency Support",
      "Cryptocurrency Zakat Calculation",
      "Dhikr & Dua Library with Authentic References",
      "Online Tasbih Counter",
      "Hijri/Islamic Calendar",
      "Ramadan Timings & Fasting Schedule",
      "Weather Integration",
      "Beautiful Responsive Design",
      "Dark/Light Theme"
    ],
    "audience": {
      "@type": "Audience",
      "audienceType": "Muslims worldwide"
    },
    "inLanguage": ["en", "ar", "ur", "hi", "fr", "es", "id", "tr"]
  }
  </script>

  <link rel="manifest" href="/manifest.json"/>

  <!-- Google Fonts: preconnect for early DNS+TLS, then load all Arabic fonts in one request -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Scheherazade+New:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Cairo:wght@400;500;600;700;800&family=Lateef:wght@400;500;600;700&family=Reem+Kufi:wght@400;500;600;700&display=swap"/>

  <!-- Font-loading overlay styles (inline = zero extra round-trips) -->
  <style>
    #flo {
      position: fixed; inset: 0;
      background: #ffffff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99999;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    #flo.done { opacity: 0; visibility: hidden; pointer-events: none; }
    .flo-ring-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 18px;
      display: grid;
      place-items: center;
    }
    .flo-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 4px solid #d1fae5; border-top-color: #059669;
      animation: flo-spin 0.85s linear infinite;
    }
    .flo-logo {
      position: relative;
      z-index: 1;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      background: #ffffff;
      padding: 2px;
      box-sizing: border-box;
    }
    .flo-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    @keyframes flo-spin { to { transform: rotate(360deg); } }
    .flo-label {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px; font-weight: 600;
      color: #059669; margin-bottom: 12px; letter-spacing: 0.03em;
    }
    .flo-arabic {
      font-family: 'Amiri', serif;
      font-size: 17px; color: #6b7280; direction: rtl;
    }
    .flo-translation {
      font-family: system-ui, sans-serif;
      font-size: 11px; color: #9ca3af;
      font-style: italic; margin-top: 5px;
    }
  </style>
  </head>
  <body>
    <!-- Arabic font-loading overlay: hides once Amiri/Noto Naskh Arabic are ready -->
    <div id="flo" aria-hidden="true">
      <div class="flo-ring-wrap">
        <div class="flo-ring"></div>
        <div class="flo-logo">
          <img src="/logo.png" alt=""/>
        </div>
      </div>
      <p class="flo-label">Loading HikmahSphere…</p>
      <p class="flo-arabic">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
      <p class="flo-translation">In the name of Allah, the Most Gracious, the Most Merciful</p>
    </div>

    <script>
      (function () {
        var el = document.getElementById('flo');
        var MAX_WAIT = 4000; // never block the app beyond 4 s

        function hide() {
          if (!el) return;
          el.classList.add('done');
          setTimeout(function () { el && el.parentNode && el.parentNode.removeChild(el); }, 400);
        }

        var timer = setTimeout(hide, MAX_WAIT);

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function () {
            // Only hide early if at least one Arabic font actually loaded
            var ok = ['Amiri', 'Noto Naskh Arabic'].some(function (f) {
              return document.fonts.check('400 16px "' + f + '"');
            });
            if (ok) { clearTimeout(timer); hide(); }
            // else let the hard timeout fire — avoids infinite block on slow connections
          });
        }
      }());
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
