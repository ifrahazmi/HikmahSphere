# ============================================
# HTTPS Fallback - Redirect to HTTP (SSL not configured)
# ============================================
server {
    listen 443;
    server_name hikmahsphere.site www.hikmahsphere.site;
    
    # Return 301 redirect to HTTP since SSL is not configured
    return 301 http://$host$request_uri;
}

server {
    listen 80;
    server_name hikmahsphere.site www.hikmahsphere.site;

    # Root directory for frontend
    root /var/www/hikmah;
    index index.html;

    # ============================================
    # Frontend - React SPA
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # Backend API Proxy
    # ============================================
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    # ============================================
    # Uploaded Files - Proof of Payment & More
    # ============================================
    location /uploads {
        alias /var/www/hikmah/uploads;
        
        # Enable CORS for file access
        add_header Access-Control-Allow-Origin *;
        
        # Allow common image and document types
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/gif gif;
            image/webp webp;
            image/svg+xml svg;
            application/pdf pdf;
            application/msword doc;
            application/vnd.openxmlformats-officedocument.wordprocessingml.document docx;
        }
        
        # Cache uploaded files (they don't change often)
        expires 7d;
        add_header Cache-Control "public";
        
        # Security: Prevent execution of uploaded scripts
        location ~ \.(php|sh|py|pl|cgi|js|exe)$ {
            deny all;
            return 404;
        }
    }

    # Specific location for proof of payment files
    location /uploads/proofs {
        alias /var/www/hikmah/uploads/proofs;
        
        # Enable CORS
        add_header Access-Control-Allow-Origin *;
        
        # Image types only
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/gif gif;
            image/webp webp;
        }
        
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Security: Prevent script execution
        location ~ \.(php|sh|py|pl|cgi|js)$ {
            deny all;
            return 404;
        }
    }

    # ============================================
    # Static Assets (Cache for 1 year)
    # ============================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # Security Headers
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # ============================================
    # SSL Configuration (Let's Encrypt)
    # ============================================
    # To enable SSL, run:
    #   sudo certbot --nginx -d hikmahsphere.site -d www.hikmahsphere.site
    #
    # After SSL is configured, uncomment the following:
    #
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/hikmahsphere.site/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hikmahsphere.site/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;
    #
    # location /.well-known/acme-challenge/ {
    #     root /var/www/hikmah;
    # }
}

# ============================================
# End of Configuration
# ============================================
# 
# Current Setup:
# - HTTP (Port 80): ✅ Active
# - HTTPS (Port 443): ⚠️ Redirects to HTTP
#
# To Enable HTTPS/SSL:
# 1. Install Certbot: sudo apt install certbot python3-certbot-nginx -y
# 2. Get SSL cert: sudo certbot --nginx -d hikmahsphere.site -d www.hikmahsphere.site
# 3. Choose "Redirect HTTP to HTTPS" when prompted
# 4. Reload Nginx: sudo systemctl reload nginx
#
# After SSL setup, this fallback server block will be automatically
# updated by Certbot to proper SSL configuration.
# ============================================
