# ============================================
# HikmahSphere Nginx Configuration
# Safe & Production-Ready Config
# ============================================

server {
    listen 80;
    server_name hikmahsphere.site www.hikmahsphere.site;

    # Root directory for frontend
    root /var/www/hikmah;
    index index.html;

    # ============================================
    # React SPA - Frontend
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # Backend API Proxy
    # ============================================
    # ^~ prevents regex locations (e.g. static asset caching) from intercepting
    # API routes that contain file extensions (e.g. /api/hajj-guide/images/*.jpg)
    location ^~ /api/ {
        # This placeholder is rendered by deploy.sh from backend/.env (PORT)
        proxy_pass http://localhost:__BACKEND_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    # ============================================
    # Uploaded Files
    # ============================================
    location /uploads/ {
        alias /var/www/hikmah/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin *;
    }

    # ============================================
    # Block Dangerous File Types Globally
    # ============================================
    location ~* \.(php|sh|py|pl|cgi|exe)$ {
        deny all;
        return 404;
    }

    # ============================================
    # Static Assets Caching
    # ============================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|mjs|svg|woff|woff2|ttf|eot|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # Security Headers
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}

# ============================================
# HTTPS Fallback - Redirect to HTTP (SSL not configured)
# ============================================
server {
    listen 443;
    server_name hikmahsphere.site www.hikmahsphere.site;
    
    # Return 301 redirect to HTTP since SSL is not configured
    return 301 http://$host$request_uri;
}

# ============================================
# End of Configuration
# ============================================
# 
# Current Setup:
# - HTTP (Port 80): ✅ Active
# - HTTPS (Port 443): ⚠️ Redirects to HTTP
#
# To Enable HTTPS/SSL:
# 1. Install Certbot: sudo apt install certbot python3-certbot-nginx -y
# 2. Get SSL cert: sudo certbot --nginx -d hikmahsphere.site -d www.hikmahsphere.site
# 3. Choose "Redirect HTTP to HTTPS" when prompted
# 4. Reload Nginx: sudo systemctl reload nginx
#
# After SSL setup, Certbot will automatically update this config.
# ============================================
