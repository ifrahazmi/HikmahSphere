server {
    listen 80;
    server_name hikmahsphere.site www.hikmahsphere.site;

    # Root directory for frontend
    root /var/www/hikmah;
    index index.html;

    # ============================================
    # Frontend - React SPA
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # Backend API Proxy
    # ============================================
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    # ============================================
    # Uploaded Files - Proof of Payment & More
    # ============================================
    location /uploads {
        alias /var/www/hikmah/uploads;
        
        # Enable CORS for file access
        add_header Access-Control-Allow-Origin *;
        
        # File types
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/gif gif;
            image/webp webp;
            image/svg+xml svg;
            application/pdf pdf;
            application/msword doc;
            application/vnd.openxmlformats-officedocument.wordprocessingml.document docx;
        }
        
        # Cache uploaded files (they don't change often)
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Prevent execution of uploaded files
        location ~ \.(php|sh|py|pl|cgi)$ {
            deny all;
            return 404;
        }
    }

    # Specific location for proof of payment files
    location /uploads/proofs {
        alias /var/www/hikmah/uploads/proofs;
        
        # Enable CORS
        add_header Access-Control-Allow-Origin *;
        
        # Image types only
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/gif gif;
            image/webp webp;
        }
        
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Security: Prevent script execution
        location ~ \.(php|sh|py|pl|cgi|js)$ {
            deny all;
            return 404;
        }
    }

    # ============================================
    # Static Assets (Cache for 1 year)
    # ============================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # Security Headers
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # ============================================
    # SSL Redirect (Let's Encrypt)
    # ============================================
    # Uncomment below after SSL is set up
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/hikmahsphere.site/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hikmahsphere.site/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # 
    # location /.well-known/acme-challenge/ {
    #     root /var/www/hikmah;
    # }
    # 
    # # Redirect HTTP to HTTPS
    # location / {
    #     return 301 https://$server_name$request_uri;
    # }
}

# ============================================
# End of Configuration
# ============================================
